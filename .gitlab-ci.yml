# Use a Docker image with Maven and Java pre-installed. 
# (Change '17' if you are using Java 21 or another version)
image: maven:3.9.6-eclipse-temurin-17

# Cache the local Maven repository to dramatically speed up future pipeline runs
variables:
  MAVEN_OPTS: "-Dmaven.repo.local=.m2/repository"

cache:
  paths:
    - .m2/repository

stages:
  - test

test_javafx_app:
  stage: test
  before_script:
    # Update package lists and install Xvfb for headless UI testing
    - apt-get update -y
    - apt-get install -y xvfb 
  script:
    # Run the maven tests inside the virtual framebuffer
    - xvfb-run mvn clean test -DexcludedGroups="Slow"
  rules:
    # This ensures the pipeline runs when commits are pushed to any branch
    - if: $CI_COMMIT_BRANCH